name: Daily log entry

on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  log:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Append daily entry
        run: |
          echo "" >> LOG.md
          echo "## $(date '+%Y-%m-%d')" >> LOG.md
          echo "Daily checkpoint." >> LOG.md

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add LOG.md
          git commit -m "chore: daily log $(date '+%Y-%m-%d')" || exit 0
          git push
